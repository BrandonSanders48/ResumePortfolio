<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brandon Sanders – LinkedIn Banner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: "Segoe UI", Arial, Helvetica, sans-serif;
  }

  .banner {
    width: 1584px;
    height: 396px;
    background: #1f3553;
    box-shadow: inset 0 -18px 0 #cfeedd;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 120px;
    position: relative;
    overflow: hidden;
  }

  /* Subtle diagonal texture lines for depth */
  .banner::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -55deg,
      transparent,
      transparent 60px,
      rgba(255,255,255,0.018) 60px,
      rgba(255,255,255,0.018) 61px
    );
    pointer-events: none;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 40px;
    z-index: 1;
  }

  .logo {
    font-size: 88px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #ffffff;
    line-height: 1;
  }

  .logo span {
    color: #9fe0c3;
  }

  .divider-v {
    width: 2px;
    height: 120px;
    background: rgba(255,255,255,0.25);
    flex-shrink: 0;
  }

  .name-block {
    color: #ffffff;
  }

  .name-block h1 {
    font-size: 52px;
    font-weight: 600;
    line-height: 1.05;
    letter-spacing: 0.5px;
  }

  .name-block h2 {
    margin-top: 14px;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 2.4px;
    text-transform: uppercase;
    border-top: 1px solid rgba(255,255,255,0.45);
    padding-top: 14px;
    color: rgba(255,255,255,0.88);
  }

  /* Export instructions overlay — hidden when printing */
  .instructions {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-family: monospace;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 6px;
    white-space: nowrap;
  }

  @media print {
    body { background: none; margin: 0; min-height: unset; }
    .instructions { display: none; }
    .banner { box-shadow: none; }
  }
</style>
</head>
<body>

<div class="banner">
  <div class="brand">
    <div class="logo">B<span>/</span>S</div>
    <div class="divider-v"></div>
    <div class="name-block">
      <h1>Brandon Sanders, CISSP</h1>
      <h2>IT Security Leader &nbsp;|&nbsp; Risk &amp; Compliance &nbsp;|&nbsp; Infrastructure Strategy</h2>
    </div>
  </div>

</div>

<div class="instructions">
  To export: zoom browser to 100% &rarr; screenshot the banner &rarr; crop to 1584&times;396 px &nbsp;|&nbsp; LinkedIn banner size: 1584&times;396
</div>

</body>
</html>
